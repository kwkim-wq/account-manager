<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>계정관리</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="titlebar"></div>

  <div class="container">
    <h1>계정 비밀번호 조회</h1>

    <!-- 1단계: 팀원 선택 -->
    <div id="step-member" class="step active">
      <label>본인을 선택하세요</label>
      <select id="member-select">
        <option value="">선택...</option>
      </select>
    </div>

    <!-- 2단계: 계정 선택 -->
    <div id="step-account" class="step">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍  계정 검색..." autocomplete="off">
      </div>
      <div id="account-list" class="account-list"></div>
    </div>

    <!-- 3단계: 인증코드 -->
    <div id="step-verify" class="step">
      <div class="verify-info">
        <p>슬랙 DM으로 인증코드를 발송했습니다</p>
        <p class="sub">슬랙을 확인하고 6자리 코드를 입력해주세요</p>
      </div>
      <div class="code-input-wrap">
        <input type="text" id="code-input" maxlength="6" placeholder="000000" autocomplete="off">
        <button id="btn-verify" class="btn primary">확인</button>
      </div>
      <button id="btn-resend" class="btn-link">코드 재발송</button>
    </div>

    <!-- 4단계: 비밀번호 표시 -->
    <div id="step-result" class="step">
      <div class="result-box">
        <div class="result-account-name" id="result-account-name"></div>
        <div class="credential-row">
          <span class="cred-label">아이디</span>
          <span id="username-text" class="cred-value">—</span>
          <button id="btn-copy-username" class="btn-icon" title="복사">📋</button>
        </div>
        <div class="credential-row">
          <span class="cred-label">비밀번호</span>
          <span id="password-text" class="cred-value">••••••••</span>
          <button id="btn-copy-password" class="btn-icon" title="복사">📋</button>
        </div>
        <div class="credential-row" id="url-row" style="display:none">
          <span class="cred-label">URL</span>
          <span id="url-text" class="cred-value url-value">—</span>
          <button id="btn-copy-url" class="btn-icon" title="복사">📋</button>
          <button id="btn-open-url" class="btn-icon" title="열기">🔗</button>
        </div>
        <div class="timer">
          <div class="timer-bar" id="timer-bar"></div>
        </div>
        <p class="timer-text"><span id="timer-seconds">30</span>초 후 자동 숨김</p>
      </div>
      <button id="btn-back" class="btn secondary">다른 계정 조회</button>
    </div>

    <!-- 에러 -->
    <div id="error-box" class="error-box hidden"></div>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
